<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Stackly</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img src="images/logo.webp" class="loader-logo">
  <h2>SECURE LOGIN...</h2>
</div>

<!-- BACK -->
<a href="index.html" style="position:absolute;top:20px;left:20px;color:white;text-decoration:none;">← Home</a>

<!-- LOGIN SECTION -->
<section class="cards" style="height:100vh;align-items:center;">

  <!-- LEFT IMAGE -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1555949963-aa79dcee981c">
  </div>

  <!-- RIGHT FORM -->
  <div class="card">

    <h2>WELCOME BACK</h2>
    <p>Access your dashboard securely</p>

    <form>

      <input type="email" placeholder="Email Address" required><br><br>

      <input type="password" placeholder="Password" required><br><br>

      <button type="submit">Login</button>

    </form>

    <p style="margin-top:15px">
      New user? <a href="signup.html" style="color:orange">Sign Up</a>
    </p>

  </div>

</section>

<script src="script.js"></script>

</body>
</html>
