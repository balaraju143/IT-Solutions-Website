<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - Stackly</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <img src="images/logo.webp" class="loader-logo">
  <h2>CREATING ACCOUNT...</h2>
</div>

<!-- BACK -->
<a href="index.html" style="position:absolute;top:20px;left:20px;color:white;text-decoration:none;">← Home</a>

<!-- SIGNUP SECTION -->
<section class="cards" style="height:100vh;align-items:center;">

  <!-- FORM -->
  <div class="card">

    <h2>CREATE ACCOUNT</h2>
    <p>Join Stackly IT Solutions</p>

    <form>

      <input type="text" placeholder="Full Name" required><br><br>

      <input type="email" placeholder="Email Address" required><br><br>

      <input type="password" placeholder="Password" required><br><br>

      <input type="password" placeholder="Confirm Password" required><br><br>

      <button type="submit">Sign Up</button>

    </form>

    <p style="margin-top:15px">
      Already have account? <a href="login.html" style="color:orange">Login</a>
    </p>

  </div>

  <!-- IMAGE -->
  <div class="card">
    <img src="https://images.unsplash.com/photo-1519389950473-47ba0277781c">
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
