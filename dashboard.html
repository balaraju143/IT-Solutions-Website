<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard - Stackly IT</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="menu.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div id="loader">
  <img src="images/logo.webp" class="loader-logo">

  <h2 class="typing-text">
    <span id="text"></span><span class="cursor">|</span>
  </h2>
</div>

<!-- HEADER -->
<header class="header dashboard-header">

  <div class="logo">
    <img src="images/logo.webp">
  </div>

  <div class="header-buttons">
    
    <button class="exit-btn" onclick="window.location.href='index.html'">Exit Dashboard</button>
  </div>

</header>

<!-- TITLE -->


<!-- STATS CARDS -->
<section class="stats">

  <div class="card">
    <h3>Website Visits</h3>
    <h1>8,402</h1>
    <p class="green">Up 5% this week</p>
  </div>

  <div class="card">
    <h3>Active Clients</h3>
    <h1>124</h1>
    <p class="yellow">Requires attention</p>
  </div>

</section>

<!-- CHART -->
<section class="chart-section">

  <h2>REVENUE & TRAFFIC</h2>

  <canvas id="myChart"></canvas>

</section>

<!-- SERVICE DISTRIBUTION -->
<section class="chart-section">

  <h2>SERVICE DISTRIBUTION</h2>

  <canvas id="barChart"></canvas>

</section>

<!-- PROGRESS -->
<section class="progress-section">

  <h2>PROJECT STATUS</h2>

  <div class="progress-box">
    <span>Web Development</span>
    <span>80%</span>
    <div class="bar"><div class="fill blue" style="width:80%"></div></div>
  </div>

  <div class="progress-box">
    <span>Cloud Migration</span>
    <span>60%</span>
    <div class="bar"><div class="fill orange" style="width:60%"></div></div>
  </div>

  <div class="progress-box">
    <span>AI Integration</span>
    <span>45%</span>
    <div class="bar"><div class="fill purple" style="width:45%"></div></div>
  </div>

</section>

<!-- SYSTEM STATUS -->
<section class="status-section">

  <h2>SYSTEM STATUS</h2>

  <div class="status-item green-dot">Server Online</div>
  <div class="status-item green-dot">Database Synced</div>
  <div class="status-item green-dot">API Connected</div>
  <div class="status-item yellow-dot">High CPU Usage</div>

</section>

<script src="script.js"></script>

<script>
// LINE CHART
new Chart(document.getElementById("myChart"), {
  type: "line",
  data: {
    labels: ["May","Jun","Jul","Aug","Sep","Oct"],
    datasets: [
      {
        label: "Revenue",
        data: [80000,90000,85000,105000,110000,125000],
        borderColor: "orange",
        tension: 0.4
      },
      {
        label: "Visits",
        data: [2000,2500,2700,3000,3200,3500],
        borderColor: "cyan",
        borderDash: [5,5]
      }
    ]
  }
});

// BAR CHART
new Chart(document.getElementById("barChart"), {
  type: "bar",
  data: {
    labels: ["Web","Cloud","AI","Security"],
    datasets: [{
      data: [45,25,15,20],
      backgroundColor: ["#4cc9f0","orange","#9d4edd","#2ec4b6"]
    }]
  }
});
</script>

</body>
</html>
